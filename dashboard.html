<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=800, initial-scale=1.0">
  <title>LockLens</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #0D1117; overflow: hidden; }
    .screen { background: #0D1117; width: 100vw; height: 100vh; display: flex; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; }

    /* camera feed */
    .cam { flex: 1; background: #0D1117; position: relative; overflow: hidden; }
    #cam-canvas { width: 100%; height: 100%; object-fit: cover; display: block; }
    .bbox-overlay { position: absolute; border: 1.5px solid #FF375F; border-radius: 4px; display: none; }
    .bbox-label { position: absolute; top: -22px; left: 0; background: #FF375F; color: #fff; font-size: 9px; font-weight: 500; padding: 3px 8px; border-radius: 4px; letter-spacing: 0.05em; white-space: nowrap; }
    .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.2; pointer-events: none; }
    .crosshair::before { content: ''; position: absolute; width: 20px; height: 1px; background: #FF375F; top: 0; left: -10px; }
    .crosshair::after { content: ''; position: absolute; width: 1px; height: 20px; background: #FF375F; top: -10px; left: 0; }
    .cam-corner { position: absolute; width: 14px; height: 14px; opacity: 0.5; }
    .cam-corner.tl { top: 10px; left: 10px; border-top: 1.5px solid #FF375F; border-left: 1.5px solid #FF375F; }
    .cam-corner.tr { top: 10px; right: 10px; border-top: 1.5px solid #FF375F; border-right: 1.5px solid #FF375F; }
    .cam-corner.bl { bottom: 10px; left: 10px; border-bottom: 1.5px solid #FF375F; border-left: 1.5px solid #FF375F; }
    .cam-corner.br { bottom: 10px; right: 10px; border-bottom: 1.5px solid #FF375F; border-right: 1.5px solid #FF375F; }

    /* right panel */
    .panel { width: 240px; background: #0D1117; border-left: 0.5px solid #1C2333; display: flex; flex-direction: column; padding: 14px 12px; gap: 9px; }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: #FF375F; transition: background 0.3s; }
    .logo-text { color: #fff; font-size: 13px; font-weight: 600; letter-spacing: 0.05em; }
    .status-pill { display: inline-flex; align-items: center; gap: 6px; background: #FF375F18; border: 0.5px solid #FF375F44; border-radius: 20px; padding: 4px 10px; width: fit-content; transition: all 0.3s; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #FF375F; transition: background 0.3s; }
    .status-text { color: #FF375F; font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; transition: color 0.3s; }

    /* metrics */
    .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .metric { background: #161D2A; border-radius: 8px; padding: 8px 10px; border: 0.5px solid #1C2333; }
    .metric-label { color: #3A4A60; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
    .metric-value { color: #fff; font-size: 18px; font-weight: 500; font-family: 'SF Mono', 'Courier New', monospace; line-height: 1; }
    .metric-value.pink { color: #FF375F; }
    .metric-value.soft { color: #BDC8E0; }
    .metric-unit { color: #3A4A60; font-size: 10px; margin-left: 2px; }

    /* latency bar */
    .latency-bar { background: #161D2A; border-radius: 8px; padding: 8px 10px; border: 0.5px solid #1C2333; }
    .bar-label { color: #3A4A60; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; display: flex; justify-content: space-between; }
    .bar-label span:last-child { color: #FF375F; }
    .bar-track { background: #0D1117; border-radius: 4px; height: 3px; overflow: hidden; }
    .bar-fill { background: #FF375F; height: 100%; border-radius: 4px; width: 40%; transition: width 0.3s; }

    /* target card */
    .target-card { background: #161D2A; border-radius: 8px; padding: 8px 10px; border: 0.5px solid #1C2333; }
    .target-label { color: #3A4A60; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
    .target-value { color: #fff; font-size: 12px; }
    .target-input { background: #0D1117; border: 0.5px solid #2A3A50; border-radius: 6px; color: #fff; font-size: 11px; padding: 6px 8px; width: 100%; margin-top: 6px; outline: none; font-family: inherit; }
    .target-input::placeholder { color: #3A4A60; }

    /* controls */
    .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .btn { border-radius: 8px; padding: 12px 0; font-size: 11px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; border: none; font-family: inherit; }
    .btn-start { background: #FF375F; color: #fff; }
    .btn-stop { background: #161D2A; border: 0.5px solid #FF375F44; color: #FF375F; }

    .amd-badge { color: #1C2D40; font-size: 9px; letter-spacing: 0.05em; text-align: center; margin-top: auto; }

    /* ws status indicator */
    .ws-dot { width: 5px; height: 5px; border-radius: 50%; background: #3A4A60; margin-left: auto; }
    .ws-dot.connected { background: #30D158; }
  </style>
</head>
<body>
  <div class="screen">

    <!-- left: camera feed -->
    <div class="cam">
      <canvas id="cam-canvas"></canvas>
      <div class="cam-corner tl"></div>
      <div class="cam-corner tr"></div>
      <div class="cam-corner bl"></div>
      <div class="cam-corner br"></div>
      <div class="crosshair"></div>
      <div class="bbox-overlay" id="bbox">
        <span class="bbox-label" id="bbox-label">target</span>
      </div>
    </div>

    <!-- right: metrics panel -->
    <div class="panel">

      <div class="logo">
        <div class="logo-dot" id="logo-dot"></div>
        <span class="logo-text">LockLens</span>
        <div class="ws-dot" id="ws-dot"></div>
      </div>

      <div class="status-pill" id="status-pill">
        <div class="status-dot" id="status-dot"></div>
        <span class="status-text" id="status-text">connecting...</span>
      </div>

      <div class="metrics">
        <div class="metric">
          <div class="metric-label">latency</div>
          <div class="metric-value pink"><span id="latency">--</span><span class="metric-unit">ms</span></div>
        </div>
        <div class="metric">
          <div class="metric-label">confidence</div>
          <div class="metric-value"><span id="confidence">--</span><span class="metric-unit">%</span></div>
        </div>
        <div class="metric">
          <div class="metric-label">frames</div>
          <div class="metric-value soft"><span id="frames">0</span></div>
        </div>
        <div class="metric">
          <div class="metric-label">cost</div>
          <div class="metric-value pink">$<span id="cost">0.000</span></div>
        </div>
      </div>

      <div class="latency-bar">
        <div class="bar-label">
          <span>response time</span>
          <span id="latency-bar-label">--ms</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" id="bar-fill"></div>
        </div>
      </div>

      <div class="target-card">
        <div class="target-label">tracking target</div>
        <div class="target-value" id="target-display">"--"</div>
        <input class="target-input" id="target-input" placeholder="type new target, press enter..." autocomplete="off">
      </div>

      <div class="controls">
        <button class="btn btn-start" onclick="sendCommand('start')">Start</button>
        <button class="btn btn-stop" onclick="sendCommand('stop')">Stop</button>
      </div>

      <div class="amd-badge">AMD MI300X · ROCm 7.2 · vLLM</div>
    </div>
  </div>

  <script>
    // websocket connection to main.py
    const WS_URL = 'ws://localhost:8765';
    let ws = null;
    let reconnectTimer = null;

    function connect() {
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        document.getElementById('ws-dot').classList.add('connected');
        setStatus('ready', '#BDC8E0');
        clearTimeout(reconnectTimer);
      };

      ws.onclose = () => {
        document.getElementById('ws-dot').classList.remove('connected');
        setStatus('disconnected', '#4A5568');
        // auto reconnect every 2 seconds
        reconnectTimer = setTimeout(connect, 2000);
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        updateDashboard(data);
      };

      ws.onerror = () => ws.close();
    }

    function updateDashboard(data) {
      // status
     const statusColors = {
        tracking: '#FF375F',
        searching: '#BF9FFF',
        stopped: '#9FE0FF',
        ready: '#BDC8E0'
     };
      const color = statusColors[data.status] || '#BDC8E0';
      setStatus(data.status, color);

      // metrics
      if (data.latency !== undefined) {
        document.getElementById('latency').textContent = data.latency;
        document.getElementById('latency-bar-label').textContent = data.latency + 'ms';
    
        const pct = Math.min((data.latency / 500) * 100, 100);
        document.getElementById('bar-fill').style.width = pct + '%';
      }
      if (data.confidence !== undefined) {
        document.getElementById('confidence').textContent = Math.round(data.confidence * 100);
      }
      if (data.frames !== undefined) {
        document.getElementById('frames').textContent = data.frames;
      }
      if (data.cost !== undefined) {
        document.getElementById('cost').textContent = data.cost.toFixed(4);
      }
      if (data.target !== undefined) {
        document.getElementById('target-display').textContent = '"' + data.target + '"';
      }

      // bounding box overlay on camera feed
      if (data.found && data.cx !== undefined) {
        const cam = document.querySelector('.cam');
        const bbox = document.getElementById('bbox');
        const w = cam.offsetWidth;
        const h = cam.offsetHeight;
        const bw = (data.bw || 0.2) * w;
        const bh = (data.bh || 0.4) * h;
        const x = (data.cx * w) - (bw / 2);
        const y = (data.cy * h) - (bh / 2);
        bbox.style.display = 'block';
        bbox.style.left = x + 'px';
        bbox.style.top = y + 'px';
        bbox.style.width = bw + 'px';
        bbox.style.height = bh + 'px';
        document.getElementById('bbox-label').textContent =
          (data.target || 'target') + ' · ' + Math.round((data.confidence || 0) * 100) + '%';
      } else {
        document.getElementById('bbox').style.display = 'none';
      }
    }

    function setStatus(s, c) {
      document.getElementById('status-dot').style.background = c;
      document.getElementById('status-text').style.color = c;
      document.getElementById('status-text').textContent = s;
      document.getElementById('status-pill').style.borderColor = c + '44';
      document.getElementById('status-pill').style.background = c + '18';
      document.getElementById('logo-dot').style.background = c;
    }

    function sendCommand(cmd) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ command: cmd }));
      }
    }

    document.getElementById('target-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const val = e.target.value.trim();
        if (val) {
          sendCommand('target:' + val);
          document.getElementById('target-display').textContent = '"' + val + '"';
          e.target.value = '';
        }
      }
    });

    // start connecting
    connect();
  </script>
</body>
</html>
